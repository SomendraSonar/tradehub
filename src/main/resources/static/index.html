<!DOCTYPE html>
<html>
<head>
    <title>Crypto TradeHub</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            margin: 10px auto;
            padding: 15px;
            width: 220px;
            border-radius: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }

        #portfolio {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>🚀 Crypto TradeHub</h1>

<!-- 🔥 LIVE PRICES -->
<h2>Live Prices</h2>
<div id="crypto-container">
    Loading crypto data...
</div>

<!-- 💰 TRADE SECTION -->
<h2>Trade</h2>

<input id="coin" placeholder="coin (bitcoin)" />
<input id="amount" placeholder="amount" />

<br>

<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>

<!-- 📊 PORTFOLIO -->
<h2>Portfolio</h2>
<div id="portfolio"></div>

<!-- ✅ ONLY ONE SCRIPT -->
<script src="/js/app.js"></script>

</body>
</html>
