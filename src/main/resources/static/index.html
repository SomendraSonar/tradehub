<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto TradeHub</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }

        .logout {
            background: red;
        }
    </style>
</head>

<body>

<h1>🚀 Crypto TradeHub</h1>

<button class="logout" onclick="logout()">Logout</button>

<h2>Live Prices</h2>

<div class="card">BTC: $<span id="btc">0</span></div>
<div class="card">ETH: $<span id="eth">0</span></div>
<div class="card">SOL: $<span id="sol">0</span></div>

<h2>Trade</h2>

<input id="coin" placeholder="bitcoin">
<input id="amount" type="number" placeholder="amount">

<br>

<button onclick="buyCoin()">Buy</button>
<button onclick="sellCoin()">Sell</button>

<h2>Portfolio</h2>
<div id="portfolio"></div>

<script src="/js/app.js"></script> 

</body>
</html>
