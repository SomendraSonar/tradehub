<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto TradeHub</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            display: inline-block;
            min-width: 180px;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
        }

        .change {
            font-size: 14px;
            margin-top: 5px;
            display: block;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }

        .logout {
            background: red;
        }
    </style>
</head>

<body>

<h1>🚀 Crypto TradeHub</h1>

<button class="logout" onclick="logout()">Logout</button>

<h2>Live Prices</h2>

<div class="card">
    BTC: 
    <span id="btc" class="price">0</span>
    <span id="btc-change" class="change">0%</span>
</div>

<div class="card">
    ETH: 
    <span id="eth" class="price">0</span>
    <span id="eth-change" class="change">0%</span>
</div>

<div class="card">
    SOL: 
    <span id="sol" class="price">0</span>
    <span id="sol-change" class="change">0%</span>
</div>

<h2>Trade</h2>

<input id="coin" placeholder="btc / eth / sol">
<input id="amount" type="number" placeholder="amount">

<br>

<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>

<h2>Portfolio</h2>
<div id="portfolio"></div>

<script src="./js/app.js"></script>

</body>
</html>
